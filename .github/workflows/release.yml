name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pre-flight validation (Markdown)
        run: python3 scripts/validate-rules.py
      - name: Pre-flight validation (JSON schema)
        run: python3 tools/build-schema.py --check
      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
      - name: Package rules
        run: |
          VERSION="${{ steps.tag.outputs.new_tag }}"
          VERSION_BARE="${VERSION#v}"
          tar -czf "strspc-rules-${VERSION_BARE}.tar.gz" rules/ LICENSE NOTICE
          zip -r "strspc-rules-${VERSION_BARE}.zip" rules/ LICENSE NOTICE
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: |
            strspc-rules-*.tar.gz
            strspc-rules-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
