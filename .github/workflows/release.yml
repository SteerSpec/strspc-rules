name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-flight validation
        run: python3 scripts/validate-rules.py
      - name: Package rules
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf strspc-rules-${VERSION}.tar.gz rules/ LICENSE NOTICE
          zip -r strspc-rules-${VERSION}.zip rules/ LICENSE NOTICE
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            strspc-rules-*.tar.gz
            strspc-rules-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
