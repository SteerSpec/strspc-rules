name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.new_version }}
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pre-flight validation (JSON schema)
        run: python3 tools/build-schema.py --check
      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
      - name: Package rules
        run: |
          VERSION="${{ steps.tag.outputs.new_tag }}"
          VERSION_BARE="${VERSION#v}"
          tar -czf "strspc-rules-${VERSION_BARE}.tar.gz" rules/ LICENSE NOTICE
          zip -r "strspc-rules-${VERSION_BARE}.zip" rules/ LICENSE NOTICE
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: |
            strspc-rules-*.tar.gz
            strspc-rules-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout strspc-rules at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Checkout strspc-www
        uses: actions/checkout@v4
        with:
          repository: SteerSpec/strspc-www
          token: ${{ secrets.WWW_PAT }}
          path: www

      - name: Copy schemas
        run: |
          mkdir -p www/schemas/entity
          cp rules/core/_schema/entity.v1.schema.json www/schemas/entity/v1.json
          cp rules/core/_schema/bootstrap.schema.json www/schemas/entity/bootstrap.json

      - name: Copy versioned rules
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          rm -rf "www/rules/v${VERSION}"
          mkdir -p "www/rules/v${VERSION}/_schema"
          cp rules/core/*.json "www/rules/v${VERSION}/"
          cp rules/core/_schema/*.json "www/rules/v${VERSION}/_schema/"

      - name: Generate manifest
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          python3 tools/build-manifest.py \
            --version "$VERSION" \
            --output "www/rules/v${VERSION}/index.json"

      - name: Update latest
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          rm -rf www/rules/latest
          cp -r "www/rules/v${VERSION}" www/rules/latest

      - name: Commit and push to strspc-www
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cd www
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schemas/ rules/
          git diff --cached --quiet && echo "No changes to publish" && exit 0
          git commit -m "chore: publish rules v${VERSION}"
          git push
