name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate entity JSONs against bootstrap schema
        run: |
          python3 -c "
          import json
          from jsonschema import validate
          from pathlib import Path
          schema = json.loads(Path('rules/core/_schema/bootstrap.schema.json').read_text())
          for f in sorted(f for f in Path('rules/core').glob('*.json') if f.name != 'realm.json'):
              validate(instance=json.loads(f.read_text()), schema=schema)
              print(f'  OK: {f.name}')
          "
      - name: Validate realm.json against realm schema
        run: |
          python3 -c "
          import json
          from jsonschema import validate
          from pathlib import Path
          schema = json.loads(Path('rules/core/_schema/realm.v1.schema.json').read_text())
          data = json.loads(Path('rules/core/realm.json').read_text())
          validate(instance=data, schema=schema)
          print('  OK: realm.json')
          "

  lint-commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.yml
          globs: |
            **/*.md
            !node_modules/**
            !.beads/**
      - name: editorconfig-checker
        uses: editorconfig-checker/action-editorconfig-checker@v2
